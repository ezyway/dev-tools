# ==============================================================================
# TMUX CONFIGURATION FILE
# Location: tmux/tmux.conf
# ==============================================================================

# ------------------------------------------------------------------------------
# Terminal & System Settings
# ------------------------------------------------------------------------------

# Set the default terminal emulator mode to support 256 colors
set -g default-terminal xterm-256color

# Enable mouse support (allows clicking to select panes, resizing, scrolling, etc.)
set -g mouse on

# Allow applications running inside tmux to bypass tmux and send codes directly to the terminal
set -g allow-passthrough on

# Override/specify the terminal for tmux itself (note: override default-terminal if needed)
set -g default-terminal tmux-256color

# ------------------------------------------------------------------------------
# Prefix Key (Command Leader)
# ------------------------------------------------------------------------------

# Change the prefix key combination from the default Ctrl-b to Ctrl-x
set-option -g prefix C-x

# ------------------------------------------------------------------------------
# Pane Management & Navigation
# ------------------------------------------------------------------------------

# Switch panes using Alt + Arrow keys (without prefix key)
# M = Meta/Alt key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Split window into panes using easier-to-remember keys
# Prefix + v: split horizontally (side-by-side)
# Prefix + h: split vertically (top-and-bottom)
bind-key v split-window -h
bind-key h split-window -v

# ------------------------------------------------------------------------------
# Window Management & Navigation
# ------------------------------------------------------------------------------

# Switch windows using Shift + Arrow keys (without prefix key)
# S = Shift key
bind -n S-Left  previous-window
bind -n S-Right next-window

# Move/swap windows left or right using Alt + Shift + Arrow keys
# M-S = Meta/Alt + Shift
bind -n M-S-Left  swap-window -t -1 \; previous-window
bind -n M-S-Right swap-window -t +1 \; next-window

# Automatically rename window titles based on the currently active process
set-window-option -g automatic-rename on

# Allow tmux to set the terminal emulator title bar
set-option -g set-titles on

# ------------------------------------------------------------------------------
# Config Reload
# ------------------------------------------------------------------------------

# Reload the tmux configuration file on the fly
# Prefix + r: Reload configuration and display confirmation message
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# ------------------------------------------------------------------------------
# Activity Monitoring
# ------------------------------------------------------------------------------

# Monitor windows for activity; highlights the window list in the status bar on activity
setw -g monitor-activity on

# Disable silence monitoring (0 = off). Does not alert on absence of activity.
# Do NOT reset the color of the tab after activity stops occurring.
setw -g monitor-silence 0

# ------------------------------------------------------------------------------
# Theme, Colors, and Style Settings
# ------------------------------------------------------------------------------

# Style for the currently active window in the status bar (Bold text, blue background)
set-window-option -g window-status-current-style bold,bg=blue,fg=colour234

# Style for all other windows in the status bar (Greenish text color)
set-window-option -g window-status-style fg=colour35

# Style for windows showing activity alerts (Bold text, dark background, white text)
set -g window-status-activity-style bold,bg=colour234,fg=white

# Style for status bar messages/prompts (Dark grey background, white text)
set-option -g message-style bg=colour237,fg=colour231

# Pane border style for inactive panes
set-option -g pane-border-style fg=colour36

# Pane border style for the active pane
set-option -g pane-active-border-style fg=colour35

# ------------------------------------------------------------------------------
# Status Bar Customization
# ------------------------------------------------------------------------------

# Center the window list in the status bar
set-g status-justify centre

# Status bar background and foreground colors
set -g status-bg black
set -g status-fg colour35

# Refresh interval of the status bar (in seconds)
set -g status-interval 60

# Max length of the left side of the status bar
set -g status-left-length 50

# Content of the left side of status bar: [ Username | Hostname ]
set -g status-left "#[bg=colour35,fg=colour234,bold] #(whoami) | #H "

# Content of the right side of status bar: [ Day-Month-Year | Hour:Minute AM/PM ]
set -g status-right '#[fg=colour34]%d-%b-%Y | %I:%M %p '
